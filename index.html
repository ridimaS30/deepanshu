<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Whimsical Inquiry ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Playfair+Display:ital,wght@0,400;1,500&display=swap');

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            /* Wallpaper remains the same on all pages */
            background-image: linear-gradient(rgba(255, 250, 240, 0.7), rgba(255, 250, 240, 0.7)), 
                              url('background.jpeg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Playfair Display', serif;
            text-align: center;
            overflow: hidden;
        }

        /* Rainbow Border Animation */
        @keyframes rainbowBorder {
            0% { border-color: #d4af37; box-shadow: 0 10px 40px rgba(212, 175, 55, 0.3); }
            33% { border-color: #8b0000; box-shadow: 0 10px 40px rgba(139, 0, 0, 0.3); }
            66% { border-color: #ffb6c1; box-shadow: 0 10px 40px rgba(255, 182, 193, 0.3); }
            100% { border-color: #d4af37; box-shadow: 0 10px 40px rgba(212, 175, 55, 0.3); }
        }

        /* Cinema Flash Overlay */
        #cinema-flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            opacity: 0;
            z-index: 200;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .container {
            background: rgba(255, 253, 250, 0.95);
            padding: 2.5rem;
            border-radius: 20px;
            border: 4px solid #d4af37;
            width: 85%;
            max-width: 400px;
            z-index: 10;
            position: relative;
            animation: floatContainer 4s ease-in-out infinite, rainbowBorder 6s linear infinite;
            backdrop-filter: blur(5px);
            transition: opacity 1s ease;
        }

        @keyframes floatContainer {
            0%, 100% { transform: translateY(0) rotate(-1deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }

        .media-style {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px double #d4af37;
            margin-bottom: 20px;
            padding: 5px;
            background: white;
            animation: rainbowBorder 6s linear infinite;
        }

        /* Envelope Section */
        #envelope-wrapper {
            display: none;
            cursor: pointer;
            width: 280px;
            height: 180px;
            background: #fffdfa;
            border: 3px solid #d4af37;
            position: relative;
            margin: 20px auto;
            perspective: 1000px;
            z-index: 20;
            animation: rainbowBorder 6s linear infinite;
        }

        #envelope-lid {
            position: absolute;
            top: 0; left: 0;
            width: 0; height: 0;
            border-left: 140px solid transparent;
            border-right: 140px solid transparent;
            border-top: 100px solid #f3e5ab;
            z-index: 25;
            transform-origin: top;
            transition: transform 1s ease-in-out;
        }

        .envelope-open #envelope-lid { transform: rotateX(180deg); z-index: 5; }

        #wax-seal {
            position: absolute;
            top: 50px; left: 50%;
            transform: translate(-50%, -50%);
            width: 45px; height: 45px;
            background: #c21e56; 
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            z-index: 30;
            transition: opacity 0.5s;
        }

        .flying {
            animation: whimsicalFly 3s ease-in-out forwards;
            pointer-events: none;
        }

        @keyframes whimsicalFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(600px, -800px) rotate(60deg) scale(0); opacity: 0; }
        }

        h1 { font-family: 'Pinyon Script', cursive; color: #8b0000; font-size: 2.5rem; margin: 0.5rem 0; }

        button {
            padding: 12px 25px;
            font-family: 'Playfair Display', serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 2px solid #d4af37;
            background: white;
            cursor: pointer;
            transition: transform 0.3s ease;
            font-size: 0.8rem;
            animation: rainbowBorder 6s linear infinite;
        }

        #yesBtn { background: #8b0000; color: white; border: none; }
        .pulse-glow { animation: glowing 1.5s infinite; }

        @keyframes glowing {
            0% { box-shadow: 0 0 5px #8b0000; }
            50% { box-shadow: 0 0 20px rgba(139, 0, 0, 0.4); }
            100% { box-shadow: 0 0 5px #8b0000; }
        }

        #celebration, #flower-page { display: none; opacity: 0; }

        .flower-img {
            width: 100%;
            max-width: 280px;
            border-radius: 10px;
            border: 4px double #d4af37;
            animation: rainbowBorder 6s linear infinite;
        }

        /* HEARTS LAYERED OVER EVERYTHING */
        .heart {
            position: fixed;
            bottom: -10px;
            font-size: 20px;
            pointer-events: none;
            animation: floatUp 5s linear forwards;
            z-index: 999; 
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="cinema-flash"></div>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="container" id="main-content">
        <img src="us.jpeg" alt="Portrait" class="media-style">
        <h1>Happiest 6 months!!!</h1>
        <p style="font-style: italic; color: #555;">Would you do me the immense honor of being my boyfriend?</p>
        <div style="display: flex; justify-content: center; gap: 15px; margin-top: 20px;">
            <button id="yesBtn" onclick="movieSequence()">I shall</button>
            <button id="noBtn" onclick="makeYesBigger()">I cannot</button>
        </div>
    </div>

    <div id="celebration" class="container">
        <video id="successVideo" class="media-style" muted loop playsinline>
            <source src="celebration.mp4" type="video/mp4">
        </video>
        <h1>Good Job Baby!❤️</h1>
        <div id="wait-wait-text" style="display:none; color:#d4af37; font-style:italic;">Wait, wait...</div>
    </div>

    <div id="envelope-wrapper" onclick="openEnvelope()">
        <div id="envelope-lid"></div>
        <div id="wax-seal">❤</div>
        <div style="position:absolute; bottom: 20px; width: 100%; font-size: 12px; color: #d4af37; font-style: italic;">Tap to open your letter</div>
    </div>

    <div id="flower-page" class="container">
        <img src="flowers.jpeg" alt="Flowers" class="flower-img" id="finalFlowers">
        <p style="margin-top: 15px; font-style: italic; color: #d4af37;">Forever yours.</p>
    </div>

    <script>
        let yesSize = 1;
        const messages = ["Are you quite sure?", "Perhaps reconsider?", "My heart breaks...", "Say Yes!"];
        let messageIndex = 0;

        function playMusic() {
            const audio = document.getElementById('bgMusic');
            audio.play().catch(() => {});
        }

        function makeYesBigger() {
            playMusic();
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');
            
            yesBtn.classList.add('pulse-glow');
            yesSize += 0.3;
            yesBtn.style.transform = `scale(${yesSize})`;
            
            if (messageIndex < messages.length) {
                noBtn.innerText = messages[messageIndex];
                messageIndex++;
            } else {
                noBtn.innerText = "Yield to Yes! ❤️";
            }
        }

        function movieSequence() {
            playMusic();
            const flash = document.getElementById('cinema-flash');
            flash.style.opacity = '1';
            
            setTimeout(() => {
                // Background stays as the wallpaper, we just switch content
                document.getElementById('main-content').style.display = 'none';
                flash.style.opacity = '0';
                
                setTimeout(() => {
                    const celebration = document.getElementById('celebration');
                    celebration.style.display = 'block';
                    setTimeout(() => { celebration.style.opacity = '1'; }, 100);
                    
                    const video = document.getElementById('successVideo');
                    video.play();
                    
                    startConfetti();
                    
                    setTimeout(() => { document.getElementById('wait-wait-text').style.display = 'block'; }, 35000);

                    setTimeout(() => {
                        document.getElementById('celebration').style.display = 'none';
                        document.getElementById('envelope-wrapper').style.display = 'block';
                    }, 39000);
                }, 500); // Shorter pause for transition
            }, 300);
        }

        function openEnvelope() {
            const wrapper = document.getElementById('envelope-wrapper');
            wrapper.classList.add('envelope-open');
            setTimeout(() => {
                wrapper.classList.add('flying');
                setTimeout(() => {
                    wrapper.style.display = 'none';
                    document.getElementById('flower-page').style.display = 'block';
                    setTimeout(() => { document.getElementById('flower-page').style.opacity = '1'; }, 100);
                    setInterval(createHeart, 400);
                }, 1500);
            }, 1000);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            const icons = ['🌸', '💗', '❤️', '✨'];
            heart.innerHTML = icons[Math.floor(Math.random()*icons.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }

        function startConfetti() {
            var duration = 39 * 1000;
            var animationEnd = Date.now() + duration;
            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                confetti({ 
                    particleCount: 2, angle: 60, spread: 55, origin: { x: 0 },
                    colors: ['#d4af37', '#8b0000', '#ffb6c1']
                });
                confetti({ 
                    particleCount: 2, angle: 120, spread: 55, origin: { x: 1 },
                    colors: ['#d4af37', '#8b0000', '#ffb6c1']
                });
            }, 150);
        }
    </script>
</body>
</html>
